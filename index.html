    <!-- Open Graph -->
    <meta property="og:title" content="Chrono Manuel" />
    <meta
      property="og:description"
      content="Outil au format PWA qui propose une solution de chronomètrage manuel pour smartphone."
    />
    <meta property="og:url" content="https://dev.bendesign.fr/chrono-manuel/" />

  <body>
    <div class="container">
      <div class="btn-container">
        <div class="lock">
          <label for="lock">Verrouillage</label>
          <input type="checkbox" id="lock" />
        </div>

        <div id="time">00:00:00.00</div>

        <button id="start">Start</button>

        <div class="stop-reset">
          <button id="stop">Stop</button>
          <button id="reset">Reset</button>
        </div>
      </div>

      <ul id="saved-times-list"></ul>

      <button id="lap">Lap</button>
    </div>

    <!-- SCRIPTS -->
    <script src="main.js"></script>
  </body>
</html>
